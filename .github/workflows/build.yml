name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore Khaos.Flow.sln

      - name: Build
        run: dotnet build Khaos.Flow.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Khaos.Flow.sln --configuration Release --no-build --verbosity normal
